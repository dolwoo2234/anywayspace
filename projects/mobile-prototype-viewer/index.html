<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mobile Prototype Viewer - Anyway Space</title>
    <link rel="stylesheet" href="../../global-theme.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
    <style>
        :root {
            --iphone-width: 380px;
            --iphone-height: 780px;
            --bezel-color: #1a1a1a;
            --frame-radius: 54px;
        }

        body {
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg-base);
            padding: 40px;
        }

        /* iPhone 15 Pro Bezel Implementation */
        .iphone-frame {
            position: relative;
            width: var(--iphone-width);
            height: var(--iphone-height);
            background: var(--bezel-color);
            border-radius: var(--frame-radius);
            padding: 12px;
            box-shadow: 0 50px 100px -20px rgba(0,0,0,0.5), 0 30px 60px -30px rgba(0,0,0,0.5);
            border: 4px solid #2a2a2a;
        }

        /* Dynamic Island */
        .dynamic-island {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 32px;
            background: #000;
            border-radius: 20px;
            z-index: 10;
        }

        /* Screen Wrapper */
        .iphone-screen {
            width: 100%;
            height: 100%;
            background: #fff;
            border-radius: calc(var(--frame-radius) - 10px);
            overflow: hidden;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Navigation Controls */
        .viewer-controls {
            position: fixed;
            left: 40px;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 12px;
            z-index: 100;
        }

        .control-btn {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 12px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            text-align: left;
        }

        .control-btn:hover {
            background: var(--accent);
            color: #000;
            border-color: var(--accent);
        }

        .control-btn.active {
            background: var(--accent);
            color: #000;
        }

        /* Title & Description */
        .viewer-info {
            position: fixed;
            right: 40px;
            top: 50%;
            transform: translateY(-50%);
            max-width: 300px;
        }

        .viewer-info h1 {
            font-size: 2.5rem;
            margin-bottom: 20px;
            line-height: 1.1;
        }

        .viewer-info p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        @media (max-width: 1000px) {
            .viewer-controls, .viewer-info {
                position: static;
                transform: none;
                margin-top: 40px;
                max-width: 100%;
            }
            body {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="dark-theme">
    <div class="viewer-controls">
        <h3 class="category-title" style="margin-bottom: 15px;">Projects</h3>
        <button class="control-btn active" data-url="../image-resizer/index.html">Image Resizer</button>
        <button class="control-btn" data-url="../video-prompt-v1/index.html">Video Prompt V1</button>
        <button class="control-btn" data-url="../filename-to-prompt/index.html">Filename to Prompt</button>
    </div>

    <div class="iphone-frame">
        <div class="dynamic-island"></div>
        <div class="iphone-screen">
            <iframe src="../image-resizer/index.html" id="viewer-iframe"></iframe>
        </div>
    </div>

    <div class="viewer-info">
        <h1 class="text-high-res">High-Res<br>Prototype</h1>
        <p>Huashu-Design 스타일이 적용된 고해상도 모바일 시뮬레이터입니다. 왼쪽 메뉴에서 각 프로젝트의 모바일 뷰를 즉시 확인할 수 있습니다.</p>
    </div>

    <script src="../../global-theme.js"></script>
    <script>
        document.querySelectorAll('.control-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                // Active 상태 변경
                document.querySelectorAll('.control-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');

                // iframe URL 변경
                const url = btn.getAttribute('data-url');
                document.getElementById('viewer-iframe').src = url;
            });
        });
    </script>
</body>
</html>
