<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Image Resizer</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .upload-area { border: 2px dashed #ccc; padding: 40px; text-align: center; margin-bottom: 20px; cursor: pointer; }
        .upload-area:hover { border-color: #777; }
        #canvas { display: none; }
        .preview-container { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }
        .preview-item { border: 1px solid #ddd; padding: 5px; }
        img { max-width: 200px; height: auto; display: block; }
    </style>
</head>
<body>
    <h1>Image Resizer (1024x576)</h1>
    <div class="upload-area" id="drop-zone">
        <p>이미지 파일을 여기에 드래그하거나 클릭하여 선택하세요</p>
        <input type="file" id="upload" accept="image/*" multiple style="display: none;">
    </div>
    <canvas id="canvas"></canvas>
    <div id="preview" class="preview-container"></div>

    <script src="script.js"></script>
</body>
</html>
