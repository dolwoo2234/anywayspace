<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Filename Gallerist</title>
    <link rel="stylesheet" href="../../global-theme.css">
    <style>
        body { font-family: 'Pretendard', sans-serif; padding: 40px 20px; }
        .container { max-width: 800px; margin: auto; background: var(--bg-card); padding: 30px; border-radius: 24px; border: 1px solid var(--border); }
        h1 { margin-bottom: 20px; color: var(--text-main); }
        textarea, input { width: 100%; padding: 15px; margin: 10px 0; background: var(--bg-base); color: var(--text-main); border: 1px solid var(--border); border-radius: 12px; }
        button { padding: 15px 30px; cursor: pointer; background: var(--accent); color: #000; border: none; border-radius: 12px; font-weight: 800; }
        .header-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header-controls">
            <h1>Filename Gallerist</h1>
            <button id="theme-toggle">🌙 Dark Mode</button>
        </div>
        <input type="file" id="file-input" multiple>
        <p style="color: var(--text-dim);">제외할 단어 (쉼표로 구분):</p>
        <input type="text" id="exclude-words" placeholder="e.g. 2026, copy, temp">
        <textarea id="output" readonly></textarea>
        <button onclick="copyToClipboard()">복사하기</button>
    </div>
    <script src="../../global-theme.js"></script>
    <script>
        const themeToggle = document.getElementById('theme-toggle');
        const updateThemeUI = () => {
            const isLight = document.body.classList.contains('light-theme');
            themeToggle.innerHTML = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
        };
        themeToggle.addEventListener('click', () => setTimeout(updateThemeUI, 10));
        updateThemeUI();

        const fileInput = document.getElementById('file-input');
        const excludeInput = document.getElementById('exclude-words');
        const output = document.getElementById('output');
        
        let originalNames = [];

        fileInput.addEventListener('change', () => {
            const files = Array.from(fileInput.files);
            originalNames = files.map(f => f.name.replace(/\.[^/.]+$/, "")).sort();
            updateList();
        });

        excludeInput.addEventListener('input', updateList);

        function updateList() {
            const excludes = excludeInput.value.split(',').map(s => s.trim()).filter(s => s !== "");
            
            let names = originalNames.map(name => {
                let processed = name;
                excludes.forEach(ex => {
                    const regex = new RegExp(ex, 'gi');
                    processed = processed.replace(regex, '');
                });
                return processed.replace(/^_+|_+$/g, '').replace(/_+/g, '_').trim();
            }).filter(n => n !== "");

            output.value = names.map((n, i) => `${i + 1}.${n}`).join('\n');
        }

        function copyToClipboard() {
            output.select();
            document.execCommand('copy');
            alert('복사되었습니다!');
        }
    </script>
</body>
</html>
