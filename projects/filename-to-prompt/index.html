<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Filename Gallerist</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #050505; color: #fff; }
        .container { max-width: 800px; margin: auto; }
        textarea { width: 100%; height: 200px; margin: 10px 0; background: #111; color: #fff; border: 1px solid #333; }
        input { width: 100%; padding: 10px; background: #111; color: #fff; border: 1px solid #333; }
        button { padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Filename Gallerist</h1>
        <input type="file" id="file-input" multiple>
        <p>제외할 단어 (쉼표로 구분):</p>
        <input type="text" id="exclude-words" placeholder="e.g. 2026, copy, temp">
        <textarea id="output" readonly></textarea>
        <button onclick="copyToClipboard()">복사하기</button>
    </div>
    <script>
        const fileInput = document.getElementById('file-input');
        const excludeInput = document.getElementById('exclude-words');
        const output = document.getElementById('output');

        fileInput.addEventListener('change', updateList);
        excludeInput.addEventListener('input', updateList);

        function updateList() {
            const files = Array.from(fileInput.files);
            const excludes = excludeInput.value.split(',').map(s => s.trim()).filter(s => s !== "");
            
            let names = files.map(f => f.name.replace(/\.[^/.]+$/, ""));
            
            excludes.forEach(ex => {
                const regex = new RegExp(ex, 'gi');
                names = names.map(n => n.replace(regex, ''));
            });

            // 단어 삭제 후 남은 불필요한 언더바 처리 및 공백 정리
            names = names.map(n => n.replace(/^_+|_+$/g, '').replace(/_+/g, '_').trim())
                         .filter(n => n !== "");
            
            // 정렬 제거: 기존 순서 유지
            
            // 번호 매기기
            output.value = names.map((n, i) => `${i + 1}.${n}`).join('\n');
        }

        function copyToClipboard() {
            output.select();
            document.execCommand('copy');
            alert('복사되었습니다!');
        }
    </script>
</body>
</html>
