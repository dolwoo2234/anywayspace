<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Prompt Archive - Anyway Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body class="archive-mode">
    <div class="showcase-container">
        <header class="header">
            <div class="header-left">
                <span class="badge">Collection #01</span>
                <h1>Video AI Archive</h1>
                <p class="subtitle">모두가 공유할 수 있는 영상 프롬프트 아카이브입니다.</p>
            </div>
            <div class="header-controls">
                <div class="size-controller">
                    <label>View Size</label>
                    <input type="range" id="size-slider" min="280" max="600" value="400">
                </div>
                <button id="admin-toggle" class="btn-admin">+ Add New Project</button>
            </div>
        </header>

        <nav class="filter-bar">
            <div id="tag-cloud" class="tag-cloud">
                <button class="tag-chip active" data-tag="all">All Works</button>
            </div>
        </nav>

        <main id="video-grid" class="video-grid">
            <!-- 데이터가 로드되면 여기에 나타납니다 -->
        </main>

        <aside id="admin-panel" class="admin-panel">
            <div class="panel-header">
                <h3>Project Settings</h3>
                <button id="close-panel" class="btn-close">&times;</button>
            </div>
            <div class="panel-body">
                <!-- 드래그 앤 드롭 업로드 -->
                <div class="input-group">
                    <label>Step 1. Video Upload</label>
                    <div id="drop-zone" class="drop-zone">
                        <div class="drop-zone-content">
                            <span class="drop-icon">🎬</span>
                            <p class="drop-text">Drag & Drop for Preview</p>
                        </div>
                        <input type="file" id="video-upload" accept="video/mp4" hidden>
                    </div>
                </div>

                <!-- 고정 경로 입력 (영구 저장용) -->
                <div class="input-group">
                    <label>Step 2. Permanent Video Path (Optional)</label>
                    <input type="text" id="edit-video-path" placeholder="e.g. assets/my-video.mp4">
                    <p class="input-hint">GitHub에 올린 파일 경로를 적으면 새로고침해도 유지됩니다.</p>
                </div>

                <div class="input-group">
                    <label>Step 3. Tags & Prompt</label>
                    <input type="text" id="edit-tags" placeholder="Tags (Comma separated)">
                    <textarea id="edit-prompt" placeholder="Enter Prompt here..."></textarea>
                </div>

                <button id="add-project" class="btn-primary">Add to Archive</button>

                <!-- 데이터 공유용 Export 기능 -->
                <div class="export-section" style="margin-top: 40px; border-top: 1px solid #222; padding-top: 20px;">
                    <label style="font-size: 0.7rem; color: #666; display: block; margin-bottom: 10px;">FOR SHARING (JSON)</label>
                    <button id="export-data" class="btn-secondary" style="width: 100%;">Copy All Data to Share</button>
                    <p class="input-hint">복사한 코드를 저(Gemini)에게 주시면 모두가 볼 수 있게 배포해 드립니다.</p>
                </div>
            </div>
        </aside>
    </div>

    <template id="video-item-template">
        <div class="video-item">
            <div class="video-wrapper">
                <video class="prompt-video" autoplay muted loop playsinline></video>
                <div class="video-status">LOOPING</div>
            </div>
            <div class="prompt-info">
                <div class="item-tags"></div>
                <div class="prompt-box">
                    <p class="display-prompt"></p>
                </div>
                <button class="btn-delete" title="Delete">&times;</button>
            </div>
        </div>
    </template>

    <script src="project-script.js"></script>
</body>
</html>
