<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Prompt Archive - Anyway Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body class="archive-mode">
    <div class="showcase-container">
        <!-- 상단 헤더 -->
        <header class="header">
            <div class="header-left">
                <span class="badge">Collection #01</span>
                <h1>Video AI Archive</h1>
                <p class="subtitle">주요 태그와 인터랙티브 레이아웃으로 영상을 탐색하세요.</p>
            </div>
            
            <div class="header-controls">
                <div class="size-controller">
                    <label>View Size</label>
                    <input type="range" id="size-slider" min="280" max="800" value="400">
                </div>
                <button id="admin-toggle" class="btn-admin">+ Add New Project</button>
            </div>
        </header>

        <!-- 태그 필터 바 -->
        <nav class="filter-bar">
            <div id="tag-cloud" class="tag-cloud">
                <button class="tag-chip active" data-tag="all">All Works</button>
            </div>
        </nav>

        <!-- 메인 콘텐츠 -->
        <main id="video-grid" class="video-grid">
            <!-- 동적 렌더링 -->
        </main>

        <!-- 매니지먼트 패널 (드래그 앤 드롭 추가) -->
        <aside id="admin-panel" class="admin-panel">
            <div class="panel-header">
                <h3>Add New Project</h3>
                <button id="close-panel" class="btn-close">&times;</button>
            </div>
            <div class="panel-body">
                <!-- 드래그 앤 드롭 업로드 영역 -->
                <div class="input-group">
                    <label>Video Upload (.mp4)</label>
                    <div id="drop-zone" class="drop-zone">
                        <div class="drop-zone-content">
                            <span class="drop-icon">🎬</span>
                            <p class="drop-text">Drag & Drop video here</p>
                            <p class="drop-subtext">or click to browse</p>
                        </div>
                        <input type="file" id="video-upload" accept="video/mp4" hidden>
                    </div>
                    <span id="file-name" class="file-name">No file chosen</span>
                </div>

                <div class="input-group">
                    <label>Tags (Comma separated)</label>
                    <input type="text" id="edit-tags" placeholder="e.g. Cyberpunk, Neon, Rain">
                </div>
                <div class="input-group">
                    <label>Prompt Text</label>
                    <textarea id="edit-prompt" placeholder="프롬프트를 입력하세요..."></textarea>
                </div>
                <button id="add-project" class="btn-primary">Add to Archive</button>
            </div>
        </aside>
    </div>

    <!-- 개별 비디오 세트 템플릿 -->
    <template id="video-item-template">
        <div class="video-item">
            <div class="video-wrapper">
                <video class="prompt-video" autoplay muted loop playsinline></video>
                <div class="video-status">LOOPING</div>
            </div>
            <div class="prompt-info">
                <div class="item-tags"></div>
                <div class="prompt-box">
                    <p class="display-prompt"></p>
                </div>
                <button class="btn-delete" title="Delete">&times;</button>
            </div>
        </div>
    </template>

    <script src="project-script.js"></script>
</body>
</html>
