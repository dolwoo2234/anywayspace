<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Archive - Anyway Space</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
</head>
<body class="archive-mode dark-theme">
    <div class="showcase-container">
        <!-- 리뉴얼된 헤더 -->
        <header class="main-header">
            <div class="brand-section">
                <span class="collection-badge">COLLECTION #01</span>
                <h1 class="main-title">Prompt Archive</h1>
                <p class="main-subtitle">Curated video-prompt synergy for high-end creators.</p>
            </div>
            
            <div class="control-center">
                <div class="control-group">
                    <label class="control-label">GRID SIZE</label>
                    <input type="range" id="size-slider" min="280" max="600" value="420">
                </div>
                <div class="action-group">
                    <button id="theme-toggle" class="icon-button" title="Toggle Theme">
                        <span class="theme-icon"></span>
                    </button>
                    <button id="admin-toggle" class="primary-action-btn">
                        <span class="plus-icon">+</span> New Entry
                    </button>
                </div>
            </div>
        </header>

        <!-- 필터 바 -->
        <nav class="filter-nav">
            <div id="tag-cloud" class="tag-flex">
                <button class="tag-pill active" data-tag="all">Everything</button>
            </div>
        </nav>

        <!-- 메인 아카이브 그리드 -->
        <main id="video-grid" class="modern-grid">
            <!-- 동적 로드 -->
        </main>

        <!-- 댓글 섹션 추가 -->
        <section id="comments" style="margin-top: 100px; padding: 40px; background: var(--bg-card); border-radius: 24px; border: 1px solid var(--border);">
            <div id="disqus_thread"></div>
            <script>
                (function() {
                var d = document, s = d.createElement('script');
                s.src = 'https://anyway-space.disqus.com/embed.js';
                s.setAttribute('data-timestamp', +new Date());
                (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </section>

        <!-- 사이드 매니지먼트 패널 -->
        <aside id="admin-panel" class="curator-drawer">
            <div class="panel-inner">
                <header class="drawer-header">
                    <h2>Management</h2>
                    <button id="close-panel" class="close-btn">&times;</button>
                </header>
                
                <div class="drawer-content">
                    <div class="form-section">
                        <label>PREVIEW UPLOAD</label>
                        <div id="drop-zone" class="premium-drop-zone">
                            <span class="drop-icon">🎬</span>
                            <p>Drop to Preview</p>
                        </div>
                    </div>

                    <div class="form-section">
                        <label>ASSET PATH</label>
                        <input type="text" id="edit-video-path" placeholder="e.g. assets/motion_01.mp4">
                    </div>

                    <div class="form-section">
                        <label>CLASSIFICATION</label>
                        <input type="text" id="edit-tags" placeholder="Action, Character, Cinematic...">
                    </div>

                    <div class="form-section">
                        <label>PROMPT SCRIPT</label>
                        <textarea id="edit-prompt" placeholder="Write your prompt logic here..."></textarea>
                    </div>

                    <button id="add-project" class="submit-btn">Register Project</button>

                    <div class="sync-footer">
                        <button id="export-data" class="sync-btn">Generate Sync Code</button>
                        <p>Share this code to update the official archive.</p>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- 템플릿 -->
    <template id="video-item-template">
        <div class="archive-card">
            <div class="card-media">
                <video class="prompt-video" autoplay muted loop playsinline></video>
                <div class="status-overlay">LIVE</div>
            </div>
            <div class="card-data">
                <div class="card-tags"></div>
                <div class="card-prompt-wrapper">
                    <p class="display-prompt"></p>
                </div>
                <button class="delete-action" title="Remove">&times;</button>
            </div>
        </div>
    </template>

    <script src="project-script.js"></script>
</body>
</html>
